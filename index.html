<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMW M1 — 1979</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --accent: #c8a96e;
        --dim: rgba(255,255,255,0.35);
        --glass: rgba(255,255,255,0.04);
      }

      body {
        background: #060606;
        color: #fff;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      /* ── Canvas ── */
      #canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      /* Spotlight glow under car */
      body::after {
        content: '';
        position: fixed;
        bottom: -10%;
        left: 50%;
        transform: translateX(-50%);
        width: 70vw;
        height: 50vh;
        background: radial-gradient(ellipse, rgba(200,169,110,0.08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 1;
      }

      /* ── UI Layer ── */
      .ui {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
      }

      /* ── Nav ── */
      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 28px 48px;
        pointer-events: all;
        opacity: 0;
      }

      .brand {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.4rem;
        letter-spacing: 0.3em;
        color: var(--accent);
      }

      .nav-links {
        display: flex;
        gap: 36px;
      }

      .nav-links a {
        color: var(--dim);
        text-decoration: none;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        transition: color 0.3s;
      }

      .nav-links a:hover { color: #fff; }

      /* ── Hero ── */
      .hero {
        padding: 0 48px;
        margin-top: auto;
        margin-bottom: auto;
        max-width: 480px;
      }

      .hero-label {
        font-size: 0.72rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 16px;
        opacity: 0;
      }

      .hero-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(5rem, 12vw, 9rem);
        line-height: 0.9;
        letter-spacing: 0.02em;
        opacity: 0;
        transform: translateY(40px);
      }

      .hero-title span {
        display: block;
        color: var(--accent);
      }

      .hero-sub {
        margin-top: 20px;
        font-size: 0.9rem;
        font-weight: 300;
        color: var(--dim);
        letter-spacing: 0.06em;
        opacity: 0;
      }

      .hero-cta {
        margin-top: 32px;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        background: transparent;
        border: 1px solid var(--accent);
        color: var(--accent);
        font-family: 'Inter', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 14px 28px;
        cursor: pointer;
        pointer-events: all;
        transition: background 0.3s, color 0.3s;
        opacity: 0;
      }

      .hero-cta:hover {
        background: var(--accent);
        color: #060606;
      }

      .hero-cta svg { width: 14px; height: 14px; }

      /* ── Specs ── */
      .specs {
        display: flex;
        align-items: center;
        gap: 0;
        padding: 24px 48px;
        border-top: 1px solid rgba(255,255,255,0.06);
        background: rgba(6,6,6,0.6);
        backdrop-filter: blur(12px);
      }

      .spec {
        display: flex;
        flex-direction: column;
        padding: 0 40px 0 0;
        opacity: 0;
        transform: translateY(20px);
      }

      .spec + .spec {
        padding-left: 40px;
        border-left: 1px solid rgba(255,255,255,0.08);
      }

      .spec-value {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2rem;
        color: #fff;
        letter-spacing: 0.04em;
        line-height: 1;
      }

      .spec-label {
        font-size: 0.65rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--dim);
        margin-top: 4px;
      }

      .spec-divider {
        flex: 1;
      }

      .scroll-hint {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--dim);
        opacity: 0;
      }

      .scroll-hint-line {
        width: 32px;
        height: 1px;
        background: var(--dim);
      }

      /* ── Loader ── */
      #loader {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: #060606;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
      }

      .loader-brand {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 3rem;
        letter-spacing: 0.4em;
        color: var(--accent);
      }

      .loader-track {
        width: 200px;
        height: 1px;
        background: rgba(255,255,255,0.1);
        position: relative;
        overflow: hidden;
      }

      #loader-bar {
        height: 100%;
        width: 0%;
        background: var(--accent);
      }

      .loader-text {
        font-size: 0.65rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--dim);
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <!-- Loader -->
    <div id="loader">
      <div class="loader-brand">BMW M1</div>
      <div class="loader-track">
        <div id="loader-bar"></div>
      </div>
      <span class="loader-text">Loading</span>
    </div>

    <!-- UI -->
    <div class="ui">
      <nav>
        <span class="brand">BMW M</span>
        <div class="nav-links">
          <a href="#">Heritage</a>
          <a href="#">Gallery</a>
          <a href="#">Specs</a>
        </div>
      </nav>

      <div class="hero">
        <div class="hero-label">1979 &mdash; Motorsport</div>
        <h1 class="hero-title">
          BMW
          <span>M1</span>
        </h1>
        <p class="hero-sub">The first M. The only original.</p>
        <button class="hero-cta">
          Explore
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>

      <div class="specs">
        <div class="spec">
          <span class="spec-value">3.5L</span>
          <span class="spec-label">Inline-6 Engine</span>
        </div>
        <div class="spec">
          <span class="spec-value">277</span>
          <span class="spec-label">Horsepower</span>
        </div>
        <div class="spec">
          <span class="spec-value">261</span>
          <span class="spec-label">Top Speed km/h</span>
        </div>
        <div class="spec">
          <span class="spec-value">5.6s</span>
          <span class="spec-label">0 – 100 km/h</span>
        </div>
        <div class="spec-divider"></div>
        <div class="scroll-hint">
          <div class="scroll-hint-line"></div>
          Drag to rotate
        </div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
